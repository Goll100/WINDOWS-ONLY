name: Build Scholastica Reader

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Restore dependencies
      run: dotnet restore ScholasticaReader.csproj

    - name: Build the app
      run: dotnet build ScholasticaReader.csproj -c Release --no-restore

    - name: Publish as single file
      run: dotnet publish ScholasticaReader.csproj -c Release -o publish --self-contained false -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ScholasticaReader
        path: publish/ScholasticaReader.exe
