name: Build Scholastica Reader
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x
    - name: Restore
      run: dotnet restore ScholasticaReader.csproj
    - name: Build
      run: dotnet build ScholasticaReader.csproj -c Release --no-restore
    - name: Publish
      run: dotnet publish ScholasticaReader.csproj -c Release -o publish --self-contained false -p:PublishSingleFile=true
    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: ScholasticaReader
        path: publish/ScholasticaReader.exe
